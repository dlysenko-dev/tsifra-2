name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./digital-clone-v3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v

      - name: Check formatting with black
        run: black --check .

      - name: Run security checks with bandit
        run: bandit -r .

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./digital-clone-v3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./digital-clone-v3/package-lock.json

      - name: Install npm dependencies
        run: npm install

      - name: Type-check TypeScript (if tsconfig exists)
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit
          else
            echo "tsconfig.json not found, skipping type check"
          fi
